<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CS Boost | Joki Class Squad Free Fire</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    color:#fff;
    font-family:'Poppins',sans-serif;

    background:
    radial-gradient(circle at 20% 20%, rgba(255,153,0,.18), transparent 25%),
    radial-gradient(circle at 80% 30%, rgba(0,170,255,.15), transparent 25%),
    linear-gradient(135deg,#050505,#101020,#050505);

    background-size:200% 200%;

    animation:bgMove 15s ease infinite;

    overflow-x:hidden;

}


body::before{

    content:"";

    position:fixed;

    inset:0;

    background-image:
    radial-gradient(circle,rgba(255,255,255,.25) 1px,transparent 1px);

    background-size:55px 55px;

    animation:particles 20s linear infinite;

    opacity:.25;

    pointer-events:none;

}


@keyframes bgMove{

0%{
    background-position:0% 50%;
}

50%{
    background-position:100% 50%;
}

100%{
    background-position:0% 50%;
}

}


@keyframes particles{

from{
    transform:translateY(0);
}

to{
    transform:translateY(-300px);
}

}


.container{

    width:90%;
    max-width:900px;
    margin:auto;
    padding:40px 0;

}


.hero{

    text-align:center;
    margin-bottom:40px;

}


.badge{

    display:inline-block;

    background:#ff9900;

    color:#000;

    padding:8px 18px;

    border-radius:50px;

    font-weight:600;

    margin-bottom:18px;

    box-shadow:
    0 0 20px rgba(255,153,0,.6);

}


.hero h1{

    font-size:50px;

    color:#ff9900;

    margin-bottom:10px;

    text-shadow:
    0 0 20px rgba(255,153,0,.6);

}


.hero p{

    color:#cfcfcf;

    font-size:16px;

}


.card{

    background:rgba(23,23,23,.88);

    backdrop-filter:blur(8px);

    border:1px solid rgba(255,255,255,.12);

    border-radius:18px;

    padding:28px;

    margin-bottom:25px;

    transition:.3s;

}


.card:hover{

    transform:translateY(-5px);

    border-color:#ff9900;

    box-shadow:
    0 0 20px rgba(255,153,0,.25);

}


.card h2{

    color:#ff9900;

    text-align:center;

    margin-bottom:25px;

}


.section{

    margin-bottom:25px;

}


.section h3{

    margin-bottom:10px;

    color:#ffffff;

}


.section ul{

    padding-left:20px;

}


.section li{

    color:#dddddd;

    margin:10px 0;

    line-height:1.6;

}


.price{

    color:#ffd54a;

    font-weight:700;

    font-size:18px;

}


.vip{

    margin:25px 0;

    background:
    linear-gradient(135deg,#ff9900,#ffb84d);

    border-radius:15px;

    padding:20px;

    text-align:center;

    color:#111;

}


.vip h3{

    margin-bottom:12px;

}


.vip p{

    margin:6px 0;

    font-weight:600;

}


.vip .promo{

    margin-top:15px;

    color:#fff;

    font-size:32px;

    font-weight:700;

}


.vip .benefit{

    margin-top:15px;

    font-size:14px;

    color:#222;

}


.button{

    display:inline-block;

    margin-top:10px;

    padding:15px 38px;

    background:#25D366;

    color:#fff;

    text-decoration:none;

    font-weight:700;

    border-radius:50px;

    transition:.3s;

}


.button:hover{

    background:#1fb95c;

    transform:scale(1.05);

}


.button-area{

    text-align:center;

}


footer{

    text-align:center;

    padding:30px;

    color:#888;

    font-size:14px;

}

</style>

</head>
