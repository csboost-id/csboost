<style>

*{
    margin:0;

    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;
    color:white;
    background:#050510;
    overflow-x:hidden;

}


/* BACKGROUND ANIMATION */

body::before{

    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at 20% 20%,rgba(255,120,0,.25),transparent 25%),
    radial-gradient(circle at 80% 40%,rgba(0,150,255,.25),transparent 25%),
    linear-gradient(#050510,#080820);

    z-index:-2;

}


body::after{

    content:"";

    position:fixed;
    inset:0;

    background-image:
    radial-gradient(circle,rgba(255,255,255,.25) 2px,transparent 2px);

    background-size:70px 70px;

    animation:moveBg 15s linear infinite;

    opacity:.25;

    z-index:-1;

}


@keyframes moveBg{

from{
    background-position:0 0;
}

to{
    background-position:300px 500px;
}

}



/* CONTAINER */

.container{

    width:90%;
    max-width:950px;
    margin:auto;
    padding:40px 0;

}



/* HERO */

.hero{

    text-align:center;
    padding:30px 0;

}


.badge{

    display:inline-block;

    background:linear-gradient(90deg,#ff9900,#ffd45c);

    color:#111;

    padding:8px 20px;

    border-radius:50px;

    font-weight:800;

    box-shadow:
    0 0 20px #ff9900;

}


.hero h1{

    font-size:55px;

    margin-top:20px;

    color:#ff9900;

    text-shadow:

}


.hero p{

    color:#ccc;

}



/* SQUAD */

.squad{

    display:flex;

    justify-content:center;

    align-items:end;

    gap:20px;

    margin:40px 0;

}



.character{

    width:30%;

    min-height:230px;

    border-radius:20px;

    background:

    linear-gradient(
    180deg,
    rgba(255,255,255,.08),
    rgba(0,0,0,.8)
    );

    border:1px solid rgba(255,255,255,.15);

    text-align:center;

    padding:20px;

    transition:.3s;

}


.character:hover{

    transform:translateY(-10px);

    border-color:#ff9900;

}



.character .silhouette{

    height:130px;

    border-radius:50%;

    background:

    circle,
    #ff9900,
    transparent 60%
    );

    margin:auto;

    width:130px;

    filter:blur(8px);

}



.character h3{

    margin-top:15px;

    color:#ffb52b;

}



.character p{

    color:#ccc;

    font-size:13px;

}

.card{

    padding:30px;

    margin-top:30px;

    border:1px solid rgba(255,255,255,.1);

    box-shadow:
    0 0 30px rgba(255,120,0,.15);

}


.card h2{

    text-align:center;

    color:#ff9900;

    margin-bottom:25px;

}



ul{

    padding-left:20px;

}



li{

    margin:12px 0;

    color:#ddd;

}


.price{

    color:#ffd54a;

    font-weight:700;

}



/* VIP */

.vip{

    margin-top:25px;

    padding:25px;

    border-radius:20px;

    text-align:center;

    color:#111;

    background:
    linear-gradient(
    135deg,
    #ff9900,
    #ffe082
    );

}


.vip .big{

    font-size:32px;

    font-weight:800;

}

.button{

    background:#25D366;

    color:white;

    text-decoration:none;

    border-radius:50px;

    font-weight:800;

    box-shadow:
    0 0 20px #25D366;

}



footer{

    text-align:center;

    padding:30px;

    color:#888;

}


</style>
